name: Validate External Record Promotion Governance

on:
  push:
    paths:
      - 'static/translation-records/**'
      - 'docs/evidence/external-physics/**'
      - 'docs/governance/external-record-promotion-governance.md'
      - 'scripts/check_external_record_promotion_governance.py'
      - '.github/workflows/validate-external-record-promotion-governance.yml'
  pull_request:
    paths:
      - 'static/translation-records/**'
      - 'docs/evidence/external-physics/**'
      - 'docs/governance/external-record-promotion-governance.md'
      - 'scripts/check_external_record_promotion_governance.py'
      - '.github/workflows/validate-external-record-promotion-governance.yml'
  workflow_dispatch:

jobs:
  validate-promotion-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate external physics records
        run: python scripts/check_external_physics_translation_records.py

      - name: Validate bibliographic intake
        run: python scripts/check_external_bibliographic_intake.py

      - name: Validate promotion governance
        run: python scripts/check_external_record_promotion_governance.py
