name: Validate Translation Records

on:
  push:
    paths:
      - 'static/translation-records/**'
      - 'scripts/check_translation_records.py'
      - 'docs/formalisms/translation-records.md'
      - 'docs/formalisms/disciplinary-translation-groundwork.md'
      - '.github/workflows/validate-translation-records.yml'
  pull_request:
    paths:
      - 'static/translation-records/**'
      - 'scripts/check_translation_records.py'
      - 'docs/formalisms/translation-records.md'
      - 'docs/formalisms/disciplinary-translation-groundwork.md'
      - '.github/workflows/validate-translation-records.yml'
  workflow_dispatch:

jobs:
  validate-translation-records:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate translation records
        run: python scripts/check_translation_records.py
