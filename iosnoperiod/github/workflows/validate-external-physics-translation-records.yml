name: Validate External Physics Translation Records

on:
  push:
    paths:
      - 'static/translation-records/**'
      - 'scripts/check_translation_records.py'
      - 'scripts/check_mathematics_crosswalk.py'
      - 'scripts/check_external_physics_translation_records.py'
      - 'docs/formalisms/external-physics-translation-records.md'
      - '.github/workflows/validate-external-physics-translation-records.yml'
  pull_request:
    paths:
      - 'static/translation-records/**'
      - 'scripts/check_translation_records.py'
      - 'scripts/check_mathematics_crosswalk.py'
      - 'scripts/check_external_physics_translation_records.py'
      - 'docs/formalisms/external-physics-translation-records.md'
      - '.github/workflows/validate-external-physics-translation-records.yml'
  workflow_dispatch:

jobs:
  validate-external-physics-translation-records:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate translation records
        run: python scripts/check_translation_records.py

      - name: Validate mathematics crosswalk
        run: python scripts/check_mathematics_crosswalk.py

      - name: Validate external physics translation records
        run: python scripts/check_external_physics_translation_records.py
