name: Verify public Pages URL

on:
  workflow_dispatch:
  schedule:
    - cron: '13 11 * * 1'

permissions:
  contents: write

jobs:
  verify-public-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify public Pages URLs
        run: node scripts/verify-public-pages-url.mjs

      - name: Validate publication status
        run: node scripts/check-publication-verification-status.mjs

      - name: Commit verification status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/publication/publication-verification-status.v0.1.json
          if git diff --cached --quiet; then
            echo "No publication verification changes to commit."
            exit 0
          fi
          git commit -m "Update public Pages verification status"
          git push
