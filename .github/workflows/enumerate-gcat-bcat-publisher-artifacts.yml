name: Enumerate GCAT-BCAT Publisher artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: '41 10 * * 1'

permissions:
  contents: read

jobs:
  enumerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enumerate Publisher artifacts
        run: node scripts/enumerate-gcat-bcat-publisher-artifacts.mjs

      - name: Upload enumeration artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcat-bcat-publisher-artifact-enumeration
          path: |
            .sync-output/gcat-bcat-publisher-artifacts.json
            .sync-output/gcat-bcat-publisher-artifacts.md
