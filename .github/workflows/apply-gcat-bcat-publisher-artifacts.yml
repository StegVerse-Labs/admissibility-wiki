name: Apply GCAT-BCAT Publisher artifact inventory

on:
  workflow_dispatch:
    inputs:
      decision_record_ref:
        description: Decision record approving Publisher artifact inventory application
        required: true
        type: string

permissions:
  contents: write

jobs:
  apply-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enumerate Publisher artifacts
        run: node scripts/enumerate-gcat-bcat-publisher-artifacts.mjs

      - name: Apply reviewed artifact inventory
        env:
          GCAT_BCAT_ARTIFACT_REVIEW_STATUS: accepted
          GCAT_BCAT_ARTIFACT_DECISION_REF: ${{ inputs.decision_record_ref }}
        run: node scripts/apply-gcat-bcat-publisher-artifacts.mjs

      - name: Validate inventory
        run: node scripts/check-formalism-publication-artifacts.mjs

      - name: Commit applied inventory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/formalisms/gcat-bcat-publication-artifacts.v0.1.json
          if git diff --cached --quiet; then
            echo "No inventory changes to commit."
            exit 0
          fi
          git commit -m "Apply GCAT-BCAT Publisher artifact inventory"
          git push
