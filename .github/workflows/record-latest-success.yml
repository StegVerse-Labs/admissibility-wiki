name: Record latest successful deploy receipt

on:
  workflow_run:
    workflows:
      - Deploy Docusaurus site to GitHub Pages
    types:
      - completed

permissions:
  contents: read

jobs:
  record-success:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create success receipt
        run: |
          mkdir -p workflow-success
          printf '%s\n' '{' > workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '  "schema": "admissibility_wiki_workflow_success.v0.1",' >> workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '  "repository": "StegVerse-Labs/admissibility-wiki",' >> workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '  "workflow": "Deploy Docusaurus site to GitHub Pages",' >> workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '  "success_scope": "validation_build_deploy_and_public_url_verification",' >> workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '  "run_id": "${{ github.event.workflow_run.id }}",' >> workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '  "head_sha": "${{ github.event.workflow_run.head_sha }}",' >> workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '  "head_branch": "${{ github.event.workflow_run.head_branch }}",' >> workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '  "conclusion": "${{ github.event.workflow_run.conclusion }}",' >> workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '  "manual_task_requirement": "none"' >> workflow-success/admissibility-wiki-workflow-success.json
          printf '%s\n' '}' >> workflow-success/admissibility-wiki-workflow-success.json

      - name: Upload success receipt
        uses: actions/upload-artifact@v4
        with:
          name: admissibility-wiki-workflow-success
          path: workflow-success/admissibility-wiki-workflow-success.json
