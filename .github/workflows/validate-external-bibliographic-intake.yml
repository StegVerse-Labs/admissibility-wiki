name: Validate External Bibliographic Intake

on:
  push:
    paths:
      - 'static/translation-records/**'
      - 'scripts/check_external_physics_translation_records.py'
      - 'scripts/check_external_bibliographic_intake.py'
      - 'docs/formalisms/external-bibliographic-intake.md'
      - '.github/workflows/validate-external-bibliographic-intake.yml'
  pull_request:
    paths:
      - 'static/translation-records/**'
      - 'scripts/check_external_physics_translation_records.py'
      - 'scripts/check_external_bibliographic_intake.py'
      - 'docs/formalisms/external-bibliographic-intake.md'
      - '.github/workflows/validate-external-bibliographic-intake.yml'
  workflow_dispatch:

jobs:
  validate-external-bibliographic-intake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate external physics records
        run: python scripts/check_external_physics_translation_records.py

      - name: Validate external bibliographic intake
        run: python scripts/check_external_bibliographic_intake.py
