name: Validate chain continuation

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: admissibility-wiki-canonical
  cancel-in-progress: false

jobs:
  validate-chain-continuation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate external framework reports
        run: python scripts/generate_external_framework_reports.py

      - name: Generate external framework evaluation results
        run: python scripts/generate_external_framework_results.py

      - name: Generate external framework page metadata
        run: python scripts/generate_external_framework_page_metadata.py

      - name: Generate external framework page mapping
        run: python scripts/generate_external_framework_page_mapping.py

      - name: Generate external framework page status
        run: python scripts/generate_external_framework_page_status.py

      - name: Scan complete validation chain
        id: full-validation-scan
        continue-on-error: true
        run: python scripts/check_full_validation_chain.py

      - name: Upload complete validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-validation-chain-report
          path: reports/full_validation_chain_report.json
          if-no-files-found: error

      - name: Upload Goal 5 validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goal5-external-frameworks-report
          path: reports/goal5_external_frameworks_report.json
          if-no-files-found: warn

      - name: Upload Guardian destination report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guardian-destination-status
          path: reports/guardian_destination_status.json
          if-no-files-found: warn

      - name: Enforce complete validation result
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('reports/full_validation_chain_report.json')
          if not path.exists():
              raise SystemExit('full validation report was not produced')
          report = json.loads(path.read_text(encoding='utf-8'))
          print(
              f"Validation summary: {report['passed_checks']}/{report['total_checks']} passed; "
              f"{report['failed_checks']} failed"
          )
          for result in report['results']:
              if result['status'] == 'FAIL':
                  print(f"\nFAIL: {result['path']}")
                  print(result.get('output') or '(no validator output)')
          if report['overall_status'] != 'PASS':
              raise SystemExit(1)
          PY

  capture-opa-evidence:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    needs: validate-chain-continuation
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pinned OPA capture and same-environment replay
        run: python scripts/run_pinned_opa_ci_capture.py

      - name: Upload OPA capture and replay receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opa-pinned-capture-replay
          path: reports/external-frameworks/opa
          if-no-files-found: warn
          retention-days: 30

  build-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    needs: validate-chain-continuation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate external framework reports
        run: python scripts/generate_external_framework_reports.py

      - name: Generate external framework evaluation results
        run: python scripts/generate_external_framework_results.py

      - name: Generate external framework page metadata
        run: python scripts/generate_external_framework_page_metadata.py

      - name: Generate external framework page mapping
        run: python scripts/generate_external_framework_page_mapping.py

      - name: Generate external framework page status
        run: python scripts/generate_external_framework_page_status.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Repo preflight
        run: node scripts/repo_preflight.mjs

      - name: Validate repo preflight status
        run: node scripts/check-repo-preflight-status.mjs

      - name: Validate public activation receipt writer
        run: node scripts/check-public-activation-receipt-writer.mjs

      - name: Validate governance and activation artifacts
        run: npm run validate

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-public-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    needs: deploy-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify deployed site root
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "${{ needs.deploy-pages.outputs.page_url }}"

      - name: Verify public status JSON
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/status/admissibility-wiki-status.json"

      - name: Verify iOS workflow mirror status JSON
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/status/ios-workflow-mirror-status.json"

      - name: Verify governed LLM reconstructive search
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-reconstructive-search"

      - name: Verify governed LLM activation map
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-activation-map"

      - name: Verify governed LLM demo overview
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-demo-overview"

      - name: Verify governed LLM demo verification
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-demo-verification"

      - name: Verify governed LLM site verification
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-site-verification"

      - name: Verify governed LLM deployment status
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-deployment-status"

      - name: Verify LLM free-tier trust chain
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/llm-free-tier-trust-chain"

      - name: Verify governed LLM archive handoff
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-archive-handoff"

      - name: Verify governed LLM route set
        run: python scripts/check_governed_llm_deployment_status.py

      - name: Write public activation receipt
        env:
          PAGE_URL: ${{ needs.deploy-pages.outputs.page_url }}
        run: node scripts/write-public-activation-receipt.mjs

      - name: Upload public activation receipt
        uses: actions/upload-artifact@v4
        with:
          name: public-activation-receipt
          path: reports/public-activation-receipt.json
          if-no-files-found: error
