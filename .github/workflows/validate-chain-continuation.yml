name: Validate chain continuation

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: admissibility-wiki-canonical
  cancel-in-progress: false

jobs:
  validate-chain-continuation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate single workflow policy
        run: python scripts/check_workflow_sprawl.py

      - name: Validate chain continuation
        run: python scripts/check_chain_status_continuation.py

      - name: Validate continuation bundle
        run: python scripts/check_continuation_bundle.py

      - name: Validate chain snapshot
        run: python scripts/check_chain_snapshot.py

      - name: Validate chain snapshot receipt
        run: python scripts/check_chain_snapshot_receipt.py

      - name: Validate chain auto state
        run: python scripts/check_chain_auto.py

      - name: Validate blocked destination record
        run: python scripts/check_blocked_destination_record.py

      - name: Validate goal state
        run: python scripts/check_goal_state.py

      - name: Validate workflow manifest
        run: python scripts/check_workflow_manifest.py

      - name: Validate external frameworks index
        run: python scripts/check_external_frameworks_index.py

      - name: Validate external framework manifests
        run: python scripts/check_external_framework_manifests.py

      - name: Validate external framework terminology
        run: python scripts/check_external_framework_terminology.py

      - name: Validate external framework reports
        run: python scripts/check_external_framework_reports.py

      - name: Validate report coverage
        run: python scripts/check_external_framework_report_coverage.py

      - name: Validate external framework report generation
        run: python scripts/check_external_framework_report_generation.py

      - name: Validate external framework expansion policy
        run: python scripts/check_external_framework_expansion_policy.py

      - name: Validate CI evidence state
        run: python scripts/check_ci_evidence.py

      - name: Resolve Guardian destination
        run: python scripts/check_guardian_destination.py

      - name: Upload destination report
        uses: actions/upload-artifact@v4
        with:
          name: guardian-destination-status
          path: reports/guardian_destination_status.json

  build-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate-chain-continuation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate governance and activation artifacts
        run: npm run validate

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-public-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-pages
    steps:
      - name: Verify deployed site root
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "${{ needs.deploy-pages.outputs.page_url }}"

      - name: Verify formalism index
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/formalisms/"

      - name: Verify CTA formalism page
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/formalisms/commit-time-admissibility"

      - name: Verify IICT formalism page
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/formalisms/irreversibility-inference-convergence-theorem"

  record-success:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest
    needs:
      - validate-chain-continuation
      - build-pages
      - deploy-pages
      - verify-public-pages
    steps:
      - name: Create success receipt
        run: |
          mkdir -p workflow-success
          cat > workflow-success/admissibility-wiki-workflow-success.json <<EOF
          {
            "schema": "admissibility_wiki_workflow_success.v0.1",
            "repository": "StegVerse-Labs/admissibility-wiki",
            "workflow": "Validate chain continuation",
            "success_scope": "validation_build_deploy_and_public_url_verification",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "head_sha": "${{ github.sha }}",
            "head_branch": "${{ github.ref_name }}",
            "conclusion": "success",
            "manual_task_requirement": "none"
          }
          EOF

      - name: Upload success receipt
        uses: actions/upload-artifact@v4
        with:
          name: admissibility-wiki-workflow-success
          path: workflow-success/admissibility-wiki-workflow-success.json

  workflow-evidence-watch:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - validate-chain-continuation
    steps:
      - name: Check workflow evidence
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          mkdir -p workflow-evidence
          RUNS_URL="https://api.github.com/repos/${REPO}/actions/runs?head_sha=${SHA}&per_page=20"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$RUNS_URL" > workflow-evidence/runs.json

          TOTAL=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('workflow-evidence/runs.json','utf8')); console.log(data.total_count ?? 0)")
          CONCLUSIONS=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('workflow-evidence/runs.json','utf8')); console.log((data.workflow_runs||[]).map(r => [r.name, r.status, r.conclusion || 'none'].join(':')).join(','))")

          cat > workflow-evidence/workflow-evidence-watch.json <<EOF
          {
            "schema": "admissibility_wiki_workflow_evidence_watch.v0.1",
            "repository": "${REPO}",
            "commit": "${SHA}",
            "workflow_run_count": ${TOTAL},
            "workflow_run_summaries": "${CONCLUSIONS}",
            "manual_task_requirement": "none",
            "activation_claim": "not_advanced_by_this_watch",
            "next_action_rule": "Use workflow success/failure artifacts and public URL verification evidence before advancing activation posture."
          }
          EOF

      - name: Upload workflow evidence watch artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-evidence-watch
          path: workflow-evidence/workflow-evidence-watch.json

  capture-failure:
    if: failure()
    runs-on: ubuntu-latest
    needs:
      - validate-chain-continuation
      - build-pages
      - deploy-pages
      - verify-public-pages
    steps:
      - name: Create bounded failure receipt
        run: |
          mkdir -p workflow-failure
          cat > workflow-failure/admissibility-wiki-workflow-failure.json <<EOF
          {
            "schema": "admissibility_wiki_workflow_failure.v0.1",
            "repository": "StegVerse-Labs/admissibility-wiki",
            "workflow": "Validate chain continuation",
            "failure_scope": "validation_build_deploy_or_public_url_verification",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "validation_result": "${{ needs.validate-chain-continuation.result }}",
            "build_result": "${{ needs.build-pages.result }}",
            "deploy_result": "${{ needs.deploy-pages.result }}",
            "verify_public_pages_result": "${{ needs.verify-public-pages.result }}",
            "next_action_rule": "Repair only the first failing validator field, missing artifact, deployment issue, or public URL check identified by the failed job logs.",
            "manual_task_requirement": "none"
          }
          EOF

      - name: Upload bounded failure receipt
        uses: actions/upload-artifact@v4
        with:
          name: admissibility-wiki-workflow-failure
          path: workflow-failure/admissibility-wiki-workflow-failure.json
