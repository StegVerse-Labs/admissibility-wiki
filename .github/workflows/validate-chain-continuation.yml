name: Validate chain continuation

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: admissibility-wiki-canonical
  cancel-in-progress: false

jobs:
  validate-chain-continuation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate single workflow policy
        run: python scripts/check_workflow_sprawl.py

      - name: Generate external framework reports
        run: python scripts/generate_external_framework_reports.py

      - name: Generate external framework evaluation results
        run: python scripts/generate_external_framework_results.py

      - name: Generate external framework page metadata
        run: python scripts/generate_external_framework_page_metadata.py

      - name: Generate external framework page mapping
        run: python scripts/generate_external_framework_page_mapping.py

      - name: Generate external framework page status
        run: python scripts/generate_external_framework_page_status.py

      - name: Validate chain continuation
        run: python scripts/check_chain_status_continuation.py

      - name: Validate continuation bundle
        run: python scripts/check_continuation_bundle.py

      - name: Validate chain snapshot
        run: python scripts/check_chain_snapshot.py

      - name: Validate chain snapshot receipt
        run: python scripts/check_chain_snapshot_receipt.py

      - name: Validate chain auto state
        run: python scripts/check_chain_auto.py

      - name: Validate blocked destination record
        run: python scripts/check_blocked_destination_record.py

      - name: Validate goal state
        run: python scripts/check_goal_state.py

      - name: Validate workflow manifest
        run: python scripts/check_workflow_manifest.py

      - name: Validate external frameworks index
        run: python scripts/check_external_frameworks_index.py

      - name: Validate external framework manifests
        run: python scripts/check_external_framework_manifests.py

      - name: Validate external framework terminology
        run: python scripts/check_external_framework_terminology.py

      - name: Validate external framework reports
        run: python scripts/check_external_framework_reports.py

      - name: Validate report coverage
        run: python scripts/check_external_framework_report_coverage.py

      - name: Validate external framework report generation
        run: python scripts/check_external_framework_report_generation.py

      - name: Validate external framework results page
        run: python scripts/check_external_framework_results_page.py

      - name: Validate external framework page metadata
        run: python scripts/check_external_framework_page_metadata.py

      - name: Validate external framework page mapping
        run: python scripts/check_external_framework_page_mapping.py

      - name: Validate external framework page status
        run: python scripts/check_external_framework_page_status.py

      - name: Validate external framework expansion policy
        run: python scripts/check_external_framework_expansion_policy.py

      - name: Validate CI evidence state
        run: python scripts/check_ci_evidence.py

      - name: Resolve Guardian destination
        run: python scripts/check_guardian_destination.py

      - name: Upload destination report
        uses: actions/upload-artifact@v4
        with:
          name: guardian-destination-status
          path: reports/guardian_destination_status.json

  build-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: validate-chain-continuation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate external framework reports
        run: python scripts/generate_external_framework_reports.py

      - name: Generate external framework evaluation results
        run: python scripts/generate_external_framework_results.py

      - name: Generate external framework page metadata
        run: python scripts/generate_external_framework_page_metadata.py

      - name: Generate external framework page mapping
        run: python scripts/generate_external_framework_page_mapping.py

      - name: Generate external framework page status
        run: python scripts/generate_external_framework_page_status.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate governance and activation artifacts
        run: npm run validate

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-public-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: deploy-pages
    steps:
      - name: Verify deployed site root
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "${{ needs.deploy-pages.outputs.page_url }}"

      - name: Verify generated evaluation results page
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/external-frameworks/evaluation-results"
