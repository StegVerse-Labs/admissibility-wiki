name: Validate chain continuation

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: admissibility-wiki-canonical-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-chain-continuation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate inference-window governance cases
        run: python scripts/validate_inference_window_governance.py

      - name: Test inference-window governance validator
        run: python -m unittest tests.test_inference_window_governance

      - name: Generate external framework reports
        run: python scripts/generate_external_framework_reports.py

      - name: Generate external framework evaluation results
        run: python scripts/generate_external_framework_results.py

      - name: Generate external framework page metadata
        run: python scripts/generate_external_framework_page_metadata.py

      - name: Generate external framework page mapping
        run: python scripts/generate_external_framework_page_mapping.py

      - name: Generate external framework page status
        run: python scripts/generate_external_framework_page_status.py

      - name: Generate implementation automation readiness matrix
        run: python scripts/generate_external_framework_automation_readiness.py

      - name: Validate implementation automation readiness matrix
        run: python scripts/check_external_framework_automation_readiness.py

      - name: Scan complete validation chain
        id: full-validation-scan
        continue-on-error: true
        run: python scripts/check_full_validation_chain.py

      - name: Upload complete validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-validation-chain-report
          path: reports/full_validation_chain_report.json
          if-no-files-found: error

      - name: Upload discovery governance proof receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovery-governance-proof-receipt
          path: reports/discovery-governance-handoff-proof-receipt.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Goal 5 validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goal5-external-frameworks-report
          path: reports/goal5_external_frameworks_report.json
          if-no-files-found: warn

      - name: Upload implementation automation readiness receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-framework-automation-readiness
          path: reports/external-frameworks/implementation-automation-readiness.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Guardian destination report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guardian-destination-status
          path: reports/guardian_destination_status.json
          if-no-files-found: warn

      - name: Enforce complete validation result
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('reports/full_validation_chain_report.json')
          if not path.exists():
              raise SystemExit('full validation report was not produced')
          report = json.loads(path.read_text(encoding='utf-8'))
          print(
              f"Validation summary: {report['passed_checks']}/{report['total_checks']} passed; "
              f"{report['failed_checks']} failed"
          )
          for result in report['results']:
              if result['status'] == 'FAIL':
                  print(f"\nFAIL: {result['path']}")
                  print(result.get('output') or '(no validator output)')
          if report['overall_status'] != 'PASS':
              raise SystemExit(1)
          PY

  capture-opa-evidence:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    needs: validate-chain-continuation
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pinned OPA capture and same-environment replay
        run: python scripts/run_pinned_opa_ci_capture.py

      - name: Validate generated OPA capture and replay artifacts
        if: always()
        run: python scripts/validate_opa_capture_artifacts.py

      - name: Upload OPA capture, replay, and validation receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opa-pinned-capture-replay
          path: reports/external-frameworks/opa
          if-no-files-found: warn
          retention-days: 30

  replay-opa-fresh-runner:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    needs: capture-opa-evidence
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download upstream OPA capture artifact
        uses: actions/download-artifact@v4
        with:
          name: opa-pinned-capture-replay
          path: reports/upstream-opa

      - name: Replay OPA on a fresh runner
        run: python scripts/run_independent_opa_ci_replay.py

      - name: Upload fresh-runner OPA replay receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opa-fresh-runner-replay
          path: reports/external-frameworks/opa-independent
          if-no-files-found: warn
          retention-days: 30

  build-selected-cedar-binary:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    needs: validate-chain-continuation
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Build and hash selected Cedar binary without executing it
        run: python scripts/build_selected_cedar_binary.py

      - name: Upload Cedar selected-binary build receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cedar-selected-binary-build
          path: reports/external-frameworks/cedar-build
          if-no-files-found: warn
          retention-days: 30

  build-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    needs: validate-chain-continuation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download canonical validation report
        uses: actions/download-artifact@v4
        with:
          name: full-validation-chain-report
          path: reports/upstream-full-validation

      - name: Publish run-bound workflow observation receipt
        run: python scripts/publish_canonical_workflow_observation_receipt.py

      - name: Reconcile bounded workflow observation history
        run: python scripts/reconcile_canonical_workflow_observation_history.py

      - name: Generate external framework reports
        run: python scripts/generate_external_framework_reports.py

      - name: Generate external framework evaluation results
        run: python scripts/generate_external_framework_results.py

      - name: Generate external framework page metadata
        run: python scripts/generate_external_framework_page_metadata.py

      - name: Generate external framework page mapping
        run: python scripts/generate_external_framework_page_mapping.py

      - name: Generate external framework page status
        run: python scripts/generate_external_framework_page_status.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Repo preflight
        run: node scripts/repo_preflight.mjs

      - name: Validate repo preflight status
        run: node scripts/check-repo-preflight-status.mjs

      - name: Validate public activation receipt writer
        run: node scripts/check-public-activation-receipt-writer.mjs

      - name: Validate governance and activation artifacts
        run: npm run validate

      - name: Build site
        id: site-build
        continue-on-error: true
        run: npm run build

      - name: Write durable Pages build receipt
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.site-build.outcome }}
        run: python scripts/write_pages_build_receipt.py
        continue-on-error: true

      - name: Upload Pages build receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pages-build-receipt
          path: reports/pages-build-receipt.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce Pages build result
        if: always()
        run: |
          test "${{ steps.site-build.outcome }}" = "success"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-public-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    needs: deploy-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify deployed site root
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "${{ needs.deploy-pages.outputs.page_url }}"

      - name: Verify public status JSON
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/status/admissibility-wiki-status.json"

      - name: Verify iOS workflow mirror status JSON
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/status/ios-workflow-mirror-status.json"

      - name: Verify inference-window governance formalism
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/formalisms/inference-window-irreversibility-governance"

      - name: Verify inference-window governance schema
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/schemas/inference-window-governance.schema.json"

      - name: Verify inference-window governance worked cases
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/examples/inference-window-governance.worked-cases.json"

      - name: Verify governed LLM reconstructive search
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-reconstructive-search"

      - name: Verify governed LLM activation map
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-activation-map"

      - name: Verify governed LLM demo overview
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-demo-overview"

      - name: Verify governed LLM demo verification
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-demo-verification"

      - name: Verify governed LLM site verification
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-site-verification"

      - name: Verify governed LLM deployment status
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-deployment-status"

      - name: Verify LLM free-tier trust chain
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/llm-free-tier-trust-chain"

      - name: Verify governed LLM archive handoff
        run: curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/governance/governed-llm-archive-handoff"

      - name: Verify governed LLM route set
        run: python scripts/check_governed_llm_deployment_status.py

      - name: Write public activation receipt
        env:
          PAGE_URL: ${{ needs.deploy-pages.outputs.page_url }}
        run: node scripts/write-public-activation-receipt.mjs

      - name: Upload public activation receipt
        uses: actions/upload-artifact@v4
        with:
          name: public-activation-receipt
          path: |
            reports/public-activation-receipt.json
            reports/discovery-governance-publication-receipt.json
          if-no-files-found: error
          retention-days: 30
