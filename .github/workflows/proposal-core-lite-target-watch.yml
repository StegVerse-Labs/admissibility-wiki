name: Proposal core-lite target watch

on:
  push:
    branches:
      - main
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  target-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Check target repository readiness
        run: |
          mkdir -p proposal-core-lite-watch
          TARGET="https://api.github.com/repos/StegVerse-Labs/proposal-governance-core-lite"
          HTTP_CODE=$(curl --silent --output proposal-core-lite-watch/target-response.json --write-out "%{http_code}" "$TARGET")
          if [ "$HTTP_CODE" = "200" ]; then
            TARGET_STATUS="available"
            NEXT_ACTION="Invoke target seed installation workflow when authorized target install credentials are present."
          else
            TARGET_STATUS="not_available"
            NEXT_ACTION="Remain pending without assigning a manual task. Re-check on schedule or next push."
          fi
          cat > proposal-core-lite-watch/proposal-core-lite-target-watch.json <<EOF
          {
            "schema": "proposal_core_lite_target_watch.v0.1",
            "repository": "StegVerse-Labs/admissibility-wiki",
            "target_repository": "StegVerse-Labs/proposal-governance-core-lite",
            "target_status": "$TARGET_STATUS",
            "http_code": "$HTTP_CODE",
            "manual_task_requirement": "none",
            "next_action": "$NEXT_ACTION",
            "failure_posture": "fail_closed_without_public_activation_claim"
          }
          EOF

      - name: Upload target watch receipt
        uses: actions/upload-artifact@v4
        with:
          name: proposal-core-lite-target-watch
          path: proposal-core-lite-watch/proposal-core-lite-target-watch.json
