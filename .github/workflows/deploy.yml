name: Deploy Docusaurus site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate governance and activation artifacts
        run: npm run validate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-public-pages:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify deployed site root
        run: |
          curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "${{ needs.deploy.outputs.page_url }}"

      - name: Verify formalism index
        run: |
          curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/formalisms/"

      - name: Verify CTA formalism page
        run: |
          curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/formalisms/commit-time-admissibility"

      - name: Verify IICT formalism page
        run: |
          curl --fail --location --retry 12 --retry-delay 10 --retry-all-errors "https://stegverse-labs.github.io/admissibility-wiki/formalisms/irreversibility-inference-convergence-theorem"

  capture-failure:
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
      - verify-public-pages
    if: failure()
    steps:
      - name: Create bounded failure receipt
        run: |
          mkdir -p workflow-failure
          cat > workflow-failure/admissibility-wiki-workflow-failure.json <<'EOF'
          {
            "schema": "admissibility_wiki_workflow_failure.v0.1",
            "repository": "StegVerse-Labs/admissibility-wiki",
            "workflow": "Deploy Docusaurus site to GitHub Pages",
            "failure_scope": "validation_build_deploy_or_public_url_verification",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "build_result": "${{ needs.build.result }}",
            "deploy_result": "${{ needs.deploy.result }}",
            "verify_public_pages_result": "${{ needs.verify-public-pages.result }}",
            "next_action_rule": "Repair only the first failing validator field, missing artifact, deployment issue, or public URL check identified by the failed job logs.",
            "manual_task_requirement": "none"
          }
          EOF

      - name: Upload bounded failure receipt
        uses: actions/upload-artifact@v4
        with:
          name: admissibility-wiki-workflow-failure
          path: workflow-failure/admissibility-wiki-workflow-failure.json
