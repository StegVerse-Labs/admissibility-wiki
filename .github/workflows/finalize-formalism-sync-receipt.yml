name: Finalize formalism sync receipt

on:
  workflow_dispatch:
    inputs:
      decision_record_ref:
        description: Decision record reference approving the sync update
        required: true
        type: string
      prior_wiki_ref:
        description: Prior wiki commit/ref before sync update
        required: false
        type: string
      new_wiki_ref:
        description: New wiki commit/ref after sync update
        required: true
        type: string

permissions:
  contents: write

jobs:
  finalize-receipt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Recreate sync check artifacts
        run: |
          node scripts/check-formalism-source-sync.mjs
          node scripts/fetch-public-formalism-source-refs.mjs
          node scripts/check-formalism-source-drift.mjs
          node scripts/write-formalism-sync-receipt-template.mjs

      - name: Finalize receipt
        env:
          SYNC_REVIEW_STATUS: accepted
          SYNC_DECISION_RECORD_REF: ${{ inputs.decision_record_ref }}
          SYNC_PRIOR_WIKI_REF: ${{ inputs.prior_wiki_ref }}
          SYNC_NEW_WIKI_REF: ${{ inputs.new_wiki_ref }}
        run: node scripts/finalize-formalism-sync-receipt.mjs

      - name: Commit finalized receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/sync/receipts/*.json
          if git diff --cached --quiet; then
            echo "No finalized receipt to commit."
            exit 0
          fi
          git commit -m "Finalize formalism source sync receipt"
          git push
