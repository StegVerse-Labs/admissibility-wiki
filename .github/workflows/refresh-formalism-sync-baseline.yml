name: Refresh formalism sync baseline

on:
  workflow_dispatch:
    inputs:
      decision_record_ref:
        description: Decision record reference approving baseline refresh
        required: true
        type: string

permissions:
  contents: write

jobs:
  refresh-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate manifest
        run: node scripts/check-formalism-source-sync.mjs

      - name: Fetch public source refs
        run: node scripts/fetch-public-formalism-source-refs.mjs

      - name: Refresh accepted baseline
        env:
          SYNC_REVIEW_STATUS: accepted
          SYNC_DECISION_RECORD_REF: ${{ inputs.decision_record_ref }}
        run: node scripts/refresh-formalism-sync-baseline.mjs

      - name: Validate refreshed manifest
        run: node scripts/check-formalism-source-sync.mjs

      - name: Commit refreshed baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/sync/formalism-source-sync.v0.1.json
          if git diff --cached --quiet; then
            echo "No baseline refresh changes to commit."
            exit 0
          fi
          git commit -m "Refresh formalism source sync baseline"
          git push
