name: Validate formalism registry extensions

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'static/formalisms/*registry-extension*.json'
      - 'scripts/check-formalism-registry-extensions.mjs'
      - '.github/workflows/validate-formalism-registry-extensions.yml'
  push:
    branches:
      - main
    paths:
      - 'static/formalisms/*registry-extension*.json'
      - 'scripts/check-formalism-registry-extensions.mjs'
      - '.github/workflows/validate-formalism-registry-extensions.yml'

permissions:
  contents: read

jobs:
  validate-extensions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate formalism registry extensions
        run: node scripts/check-formalism-registry-extensions.mjs
