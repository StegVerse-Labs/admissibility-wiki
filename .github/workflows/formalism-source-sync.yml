name: Formalism source sync check

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate formalism source sync manifest
        run: node scripts/check-formalism-source-sync.mjs

      - name: Fetch public formalism source refs
        run: node scripts/fetch-public-formalism-source-refs.mjs

      - name: Detect manifest-declared source drift
        run: node scripts/check-formalism-source-drift.mjs

      - name: Write sync receipt template
        run: node scripts/write-formalism-sync-receipt-template.mjs

      - name: Emit sync issue body when needed
        run: node scripts/emit-formalism-sync-issues.mjs

      - name: Write sync check summary
        run: |
          mkdir -p .sync-output
          cat > .sync-output/formalism-source-sync-summary.md <<'SUMMARY'
          # Formalism Source Sync Check

          This scheduled check validates the formalism source sync manifest, fetches public canonical source refs, detects source drift, writes a sync receipt template, and emits an issue body when a wiki update review is required.

          It preserves the authority boundary:

          - Admissible-Existence defines formalisms.
          - Publisher publishes papers and public exposition.
          - Admissibility Wiki mirrors, relates, crosswalks, and discovers relationships.

          The workflow does not silently rewrite canonical formalism claims.
          SUMMARY

      - name: Upload sync check artifact
        uses: actions/upload-artifact@v4
        with:
          name: formalism-source-sync-summary
          path: |
            .sync-output/formalism-source-sync-summary.md
            .sync-output/formalism-source-sync-issue.md
            .sync-output/formalism-source-drift-report.md
            .sync-output/formalism-source-drift-report.json
            .sync-output/formalism-source-sync-receipt-template.json
            .sync-output/public-formalism-source-refs.json
            .sync-output/public-formalism-source-refs.md

      - name: Create sync-required issue
        if: ${{ hashFiles('.sync-output/formalism-source-sync-issue.md') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const bodyPath = '.sync-output/formalism-source-sync-issue.md';
            const body = fs.readFileSync(bodyPath, 'utf8');
            if (body.trim() === 'NO_SYNC_ISSUE_REQUIRED') {
              core.info('No sync issue required.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Formalism source sync update required',
              body,
              labels: ['formalism-sync', 'wiki-update-required']
            });
