name: Validate Entity Sandbox Runner Admissibility Plane

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/validate-entity-sandbox-runner-admissibility-plane.yml"
      - "docs/stegverse/entity-sandbox-runner-admissibility-plane.md"
      - "static/status/entity-sandbox-runner-admissibility-plane-status.json"
      - "scripts/check-entity-sandbox-runner-admissibility-plane-status.mjs"
      - "package.json"

permissions:
  contents: read

jobs:
  validate-entity-sandbox-runner-admissibility-plane:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout admissibility wiki
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate entity sandbox runner admissibility plane status
        run: node scripts/check-entity-sandbox-runner-admissibility-plane-status.mjs
